crs: EPSG:2056
tile_size_m: 512
resolution_m: 1
paths:
  raw_root: data/raw
  intermediate_root: data/intermediate/tiles
  output_root: data/output/tiles
  orthophoto: data/raw/regions/zimmerwald/orthophoto/summer_rgb.tif
  dem: data/raw/regions/zimmerwald/dem/dem.tif
  tlm3d:
    buildings: data/raw/regions/zimmerwald/tlm3d/buildings.gpkg
    roads: data/raw/regions/zimmerwald/tlm3d/roads.gpkg
    paths: data/raw/regions/zimmerwald/tlm3d/paths.gpkg
    water: data/raw/regions/zimmerwald/tlm3d/water.gpkg
    forest: data/raw/regions/zimmerwald/tlm3d/forest.gpkg
    settlement: data/raw/regions/zimmerwald/tlm3d/settlement.gpkg
    landcover: data/raw/regions/zimmerwald/tlm3d/landcover.gpkg
  winter_reference: data/raw/reference/winter_rgb.tif
tiles:
  zimmerwald_001:
    bbox:
    - 2602000.0
    - 1191000.0
    - 2604000.0
    - 1193000.0
harmonize:
  orthophoto_resampling: bilinear
  dem_resampling: bilinear
  mask_resampling: nearest
terrain:
  generalized_hillshade_sigma_m: 55
  hillshade:
    azimuth: 45
    altitude: 32
  tpi_radius_px: 5
  roughness_radius_px: 3
  flow_iterations: 3
qa:
  building_edge_tolerance: 0.35
  road_brightness_min: 0.25
  water_boundary_tolerance: 0.15
  forest_boundary_tolerance: 0.3
  hallucination_tolerance: 0.4
